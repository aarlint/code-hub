apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-hub
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: code-hub
rules:
  # Workspaces: Deployments, Services, PVCs
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "pods", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaces (for vCluster lifecycle)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Traefik Middleware CRD (for ForwardAuth)
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources: ["middlewares"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: code-hub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: code-hub
subjects:
  - kind: ServiceAccount
    name: code-hub
    namespace: default
